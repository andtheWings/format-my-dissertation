services:
  rust-doc-service:
    build:
      context: ./rust-doc-service
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    volumes:
      - ./institutions:/app/institutions
    environment:
      - RUST_LOG=info

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - RUST_SERVICE_URL=http://rust-doc-service:4000
      - LLM_BASE_URL=https://reallms.rescloud.iu.edu/direct/v1
      - LLM_MODEL=gemma-4-31B-it
    depends_on:
      - rust-doc-service
